<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiftly</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="http://swiftly.test/css/style.css">
</head>
<body>

<nav class="navbar px-4 py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="http://swiftly.test" class="navbar-brand fw-bold">
            Swiftly
        </a>
        <button id="theme-toggle" class="btn btn-toggle"></button>
    </div>
</nav>
<div class="container d-flex justify-content-center">

    <div class="card p-5 w-100" style="max-width: 600px;" data-aos="fade-up">
        <h2 class="fw-bold mb-3">Draft film script</h2>
        <p class="text-muted mb-4">multimedia phase 2</p>

        <div class="mb-3">
            <p>Status:
                <strong class="text-success">
                    Completed
                </strong>
            </p>

            <p class="text-muted">Due: </p>
        </div>

        <div class="d-flex gap-2">
            <a href="http://swiftly.test/tasks/8/edit" class="btn btn-outline-warning w-50">Edit</a>
            <a href="http://swiftly.test/tasks" class="btn btn-custom w-50">Back</a>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });
</script>

</body>
<script>
    const toggleBtn = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        if (toggleBtn) {
            toggleBtn.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
        }
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    applyTheme(savedTheme);

    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });
    }
</script>
</html>
