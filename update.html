<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiftly</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="http://swiftly.test/css/style.css">
</head>
<body>

<nav class="navbar px-4 py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="http://swiftly.test" class="navbar-brand fw-bold">
            Swiftly
        </a>
        <button id="theme-toggle" class="btn btn-toggle"></button>
    </div>
</nav>
<div class="container d-flex justify-content-center">

    <div class="card p-5 w-100" style="max-width: 600px;" data-aos="fade-up">
        <h2 class="fw-bold mb-3">Edit Task</h2>
        <p class="text-muted mb-4">Update your task details.</p>

        <form action="http://swiftly.test/tasks/8" method="POST">
        <input type="hidden" name="_token" value="aNHFSXuKJvj9ncL32CHzQu5sTN8Awfmd0P6sjPcl" autocomplete="off">        <input type="hidden" name="_method" value="PUT">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" value="Draft film script" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">multimedia phase 2</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Due Date</label>
                <input type="date" name="due_date" value="" class="form-control">
            </div>

            <div class="mb-3 form-check">
            <input type="hidden" name="is_completed" value="0">
            <input type="checkbox" name="is_completed" value="1" checked>


            <label for="is_completed" class="form-check-label">
            Mark as Completed
        </label>
        </div>


            <button class="btn btn-custom w-100 mt-3">Update Task</button>
        </form>

        <a href="http://swiftly.test/tasks" class="btn btn-outline-light mt-3">Cancel</a>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });
</script>

</body>
<script>
    const toggleBtn = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        if (toggleBtn) {
            toggleBtn.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
        }
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    applyTheme(savedTheme);

    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });
    }
</script>
</html>
